services:
  mc:
    # image: itzg/minecraft-server
    image: mtp/mc-dev:v5
    tty: true
    stdin_open: true
    environment:
      EULA: "true"
      TYPE: PAPER
      MEMORY: 2G
      OPS: |
        Andris37
    ports:
      - "25565:25565"
    volumes:
      - ./data:/data
    restart: unless-stopped
